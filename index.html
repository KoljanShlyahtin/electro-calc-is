<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ Электро Проект PRO</title>
    <style>
        :root { --primary: #007AFF; --bg: #F2F2F7; --card: #FFFFFF; --text: #1C1C1E; --warn: #FF9500; }
        @media (prefers-color-scheme: dark) { :root { --bg: #000000; --card: #1C1C1E; --text: #FFFFFF; } }
        
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .app { max-width: 600px; margin: 0 auto; background: var(--card); border-radius: 16px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
        
        h1 { text-align: center; color: var(--primary); font-size: 20px; margin: 0 0 20px 0; }
        h2 { font-size: 16px; border-bottom: 1px solid rgba(128,128,128,0.2); padding-bottom: 8px; margin-top: 25px; color: var(--text); display: flex; align-items: center; gap: 8px; }
        h2::before { content: ''; display: block; width: 4px; height: 16px; background: var(--primary); border-radius: 2px; }
        
        .form-row { margin-bottom: 12px; }
        label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: none; border-radius: 10px; background: rgba(128,128,128,0.1); font-size: 16px; color: var(--text); box-sizing: border-box; transition: 0.2s; }
        input:focus, select:focus { outline: 2px solid var(--primary); background: rgba(128,128,128,0.05); }
        
        .toggle-group { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: rgba(128,128,128,0.05); border-radius: 10px; margin-bottom: 8px; cursor: pointer; }
        .toggle-group label { margin: 0; font-weight: normal; flex-grow: 1; }
        .toggle-group input { width: 20px; height: 20px; margin-left: 10px; }
        
        .sub-option { margin-left: 15px; margin-top: 5px; padding-left: 10px; border-left: 2px solid var(--primary); display: none; animation: fadeIn 0.3s; }
        .sub-option.visible { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; margin-top: 15px; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(0,122,255,0.3); }
        .btn-primary:active { transform: scale(0.98); }
        .btn-secondary { background: rgba(128,128,128,0.2); color: var(--primary); }
        
        #result { margin-top: 20px; padding: 15px; background: rgba(0,122,255,0.1); border-radius: 12px; display: none; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .group-list { list-style: none; padding: 0; margin: 10px 0; font-size: 14px; }
        .group-list li { padding: 6px 0; border-bottom: 1px dashed rgba(128,128,128,0.3); display: flex; justify-content: space-between; }
        .total-price { font-size: 26px; font-weight: 800; color: var(--primary); text-align: right; margin-top: 15px; }
        .alert { background: #FFF3CD; color: #856404; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; border-left: 4px solid var(--warn); line-height: 1.4; }
        
        .cable-breakdown { background: rgba(255,255,255,0.6); padding: 12px; border-radius: 8px; margin: 10px 0; font-size: 14px; }
        .cable-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .item-count { font-weight: bold; color: #333; }
        @media (prefers-color-scheme: dark) { .item-count { color: #fff; } .cable-breakdown { background: rgba(255,255,255,0.1); } }
        
        .preset-loader { background: #eef7ff; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #cce5ff; }
        .preset-select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #007AFF; background: white; color: #007AFF; font-weight: bold; }
    </style>
</head>
<body>

<div class="app">
    <h1>⚡ Электро Проект PRO</h1>

    <!-- ЗАГРУЗКА ПРЕСЕТА -->
    <div class="preset-loader">
        <label style="color:#007AFF; font-weight:bold;">📂 Быстрый старт (Шаблон)</label>
        <select id="presetSelect" class="preset-select" onchange="loadPreset()">
            <option value="">— Выберите тип квартиры —</option>
        </select>
    </div>

    <!-- ШАГ 1: БАЗОВЫЕ ПАРАМЕТРЫ -->
    <h2>1. Параметры объекта</h2>
    <div class="grid-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="form-row">
            <label>Площадь (м²)</label>
            <input type="number" id="area" value="35">
        </div>
        <div class="form-row">
            <label>Дальняя точка (м)</label>
            <input type="number" id="maxDist" value="10">
        </div>
    </div>

    <div class="form-row">
        <label>Сложность трассы</label>
        <select id="cableCoef">
            <option value="1.0">Стандарт (прямые стены)</option>
            <option value="1.2">Сложно (ниши, много углов)</option>
            <option value="0.9">Просто (минимум изгибов)</option>
        </select>
    </div>

    <div class="form-row">
        <label>Материал стен</label>
        <select id="wallType">
            <option value="350">Панель / Ж/Б (дорого штробить)</option>
            <option value="280">Монолит / Кирпич</option>
            <option value="150">ГКЛ / Дерево / Пеноблок</option>
        </select>
    </div>

    <!-- ШАГ 2: НАПОЛНЕНИЕ -->
    <h2>2. Техника и Санузлы</h2>
    <div class="toggle-group"><label>Стиральная машина</label><input type="checkbox" id="washMachine"></div>
    <div class="toggle-group"><label>Посудомоечная машина</label><input type="checkbox" id="dishWasher"></div>
    <div class="toggle-group"><label>Духовой шкаф + СВЧ</label><input type="checkbox" id="ovenMicrowave"></div>
    
    <div class="toggle-group">
        <label>Водонагреватель</label>
        <input type="checkbox" id="boilerCheck" onchange="toggleBoiler()">
    </div>
    <div id="boilerOptions" class="sub-option">
        <label>Тип нагревателя:</label>
        <select id="boilerType">
            <option value="storage">Накопительный (~2кВт)</option>
            <option value="flow">Проточный (~5-7кВт)</option>
        </select>
    </div>

    <div class="form-row" style="margin-top:10px;">
        <label>Розетки в санузле:</label>
        <input type="number" id="bathSockets" value="2">
    </div>
    
    <!-- Выбор количества зон теплого пола (все на 1 группе) -->
    <div class="toggle-group">
        <label>Теплые полы (кол-во зон)</label>
        <select id="floorHeatZones" onchange="toggleFloorHeat()" style="width: 80px; padding: 5px;">
            <option value="0">Нет</option>
            <option value="1">1 зона</option>
            <option value="2">2 зоны</option>
            <option value="3">3 зоны</option>
        </select>
    </div>
    <div id="floorHeatOptions" class="sub-option">
        <label>Общая площадь ТП (м²):</label>
        <input type="number" id="floorHeatArea" value="3">
        <div class="hint" style="font-size:11px; color:#888;">Все зоны подключаются к одному автомату</div>
    </div>

    <h2>3. Освещение и Розетки</h2>
    <div class="form-row">
        <label>Освещение комнат + Кухня + Коридор:</label>
        <input type="number" id="mainLights" value="6">
    </div>
    <div class="form-row">
        <label>Освещение Санузла (отдельно):</label>
        <input type="number" id="bathLights" value="1">
    </div>
    
    <div class="grid-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="form-row">
            <label>Выключатели:</label>
            <input type="number" id="switches" value="4">
        </div>
        <div class="form-row">
            <label>Розетки фартука:</label>
            <input type="number" id="kitchenCounter" value="3">
        </div>
    </div>
    
    <div class="form-row">
        <label>Розетки комнат + Гостиная:</label>
        <input type="number" id="roomSockets" value="8">
    </div>

    <h2>4. Управление</h2>
    <div class="toggle-group">
        <label>Мастер-клавиша (всё выкл.)</label>
        <input type="checkbox" id="masterKey" onchange="toggleMasterKey()">
    </div>
    <div id="masterKeyInfo" class="sub-option">
        <div class="alert">️ Требуется контактор (2 модуля) в щите</div>
    </div>

    <button class="btn btn-primary" onclick="calculate()">📊 Рассчитать проект</button>
    <button class="btn btn-secondary" onclick="copyResult()">📋 Копировать смету</button>

    <div id="result"></div>
</div>

<script>
    // === ЦЕНЫ ===
    const P = {
        cable_1_5: 45, cable_2_5: 70, cable_4_0: 120, cable_6_0: 180,
        socket: 150, switch: 120, pod: 30, light: 200, 
        junction_box: 40, box: 100, uzo: 1500,
        contactor: 2500, 
        work_point: 500, work_light: 400, work_panel: 3500, work_group: 250,
        floor_heat_control: 2500, // Терморегулятор + монтаж (1 шт на всю группу)
        floor_heat_mat: 1500      // Цена за м² мата
    };

    let presetsData = [];

    // Загрузка пресетов из файла
    fetch('presets.json')
        .then(response => response.json())
        .then(data => {
            presetsData = data;
            const select = document.getElementById('presetSelect');
            data.forEach((p, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.text = p.name;
                select.appendChild(option);
            });
        })
        .catch(err => console.log("presets.json не найден или ошибка сети"));

    function loadPreset() {
        const idx = document.getElementById('presetSelect').value;
        if(idx === "") return;
        
        const p = presetsData[idx];
        
        // Безопасное присвоение значений с проверкой на undefined
        const setVal = (id, val, def) => {
            const el = document.getElementById(id);
            if(el) el.value = (val !== undefined && val !== null) ? val : def;
        };
        const setCheck = (id, val) => {
            const el = document.getElementById(id);
            if(el) el.checked = !!val;
        };

        setVal('area', p.area, 35);
        setVal('maxDist', p.maxDist, 10);
        setVal('cableCoef', p.cableCoef, 1.0);
        setVal('wallType', p.wallType, 350);
        
        setCheck('washMachine', p.washMachine);
        setCheck('dishWasher', p.dishWasher);
        setCheck('ovenMicrowave', p.ovenMicrowave);
        
        setCheck('boilerCheck', p.boilerCheck);
        if(p.boilerType) document.getElementById('boilerType').value = p.boilerType;
        toggleBoiler();
        
        setVal('bathSockets', p.bathSockets, 2);
        
        setVal('floorHeatZones', p.floorHeatZones, 0);
        setVal('floorHeatArea', p.floorHeatArea, 3);
        toggleFloorHeat();
        
        setVal('mainLights', p.mainLights, 6);
        setVal('bathLights', p.bathLights, 1);
        setVal('switches', p.switches, 4);
        setVal('kitchenCounter', p.kitchenCounter, 3);
        setVal('roomSockets', p.roomSockets, 8);
        
        setCheck('masterKey', p.masterKey);
        toggleMasterKey();
        
        calculate();
    }

    function toggleBoiler() { 
        const el = document.getElementById('boilerOptions');
        const chk = document.getElementById('boilerCheck');
        if(chk) el.classList.toggle('visible', chk.checked); 
    }
    
    function toggleFloorHeat() { 
        const zonesEl = document.getElementById('floorHeatZones');
        const el = document.getElementById('floorHeatOptions');
        const zones = zonesEl ? parseInt(zonesEl.value) : 0;
        
        if(zones > 0) {
            el.classList.add('visible');
            const areaEl = document.getElementById('floorHeatArea');
            if(areaEl && !areaEl.value) areaEl.value = zones * 3;
        } else {
            el.classList.remove('visible');
        }
    }
    
    function toggleMasterKey() { 
        const el = document.getElementById('masterKeyInfo');
        const chk = document.getElementById('masterKey');
        if(chk) el.classList.toggle('visible', chk.checked); 
    }

        // === РАСЧЕТ КАБЕЛЯ (ИСПРАВЛЕННАЯ ВЕРСИЯ) ===
    function calculateCable(area, totalPoints, maxDist, complexityCoef, hasFloorHeat) {
        // Явно превращаем всё в числа
        const a = Number(area) || 0;
        const tp = Number(totalPoints) || 0;
        const md = Number(maxDist) || 0;
        const cc = Number(complexityCoef) || 1.0;

        if (a <= 0) return { total: 0, pwr: 0, light: 0 };
        
        const perimeter = Math.sqrt(a) * 4;
        let baseLen = perimeter * 1.2; 
        const pointsLen = tp * 1.5; 
        const distAdjustment = md > 15 ? ((md - 15) * 2) : 0;
        const fhLen = hasFloorHeat ? 20 : 0;
        
        // Проверяем, не NaN ли результат промежуточных вычислений
        let rawTotal = (baseLen + pointsLen + distAdjustment + fhLen) * cc;
        
        if (isNaN(rawTotal)) {
            console.error("Ошибка в расчете кабеля:", { a, tp, md, cc, baseLen, pointsLen });
            return { total: 0, pwr: 0, light: 0 };
        }

        let finalTotal = Math.ceil(rawTotal * 1.15);

        return {
            total: finalTotal,
            pwr: Math.ceil(finalTotal * 0.7),
            light: Math.ceil(finalTotal * 0.3)
        };
    }

    function calculate() {
        try {
            // 1. БАЗА (с защитой от NaN)
            const area = parseFloat(document.getElementById('area').value) || 0;
            const wallPrice = parseFloat(document.getElementById('wallType').value) || 350;
            const cableCoef = parseFloat(document.getElementById('cableCoef').value) || 1.0;
            const maxDist = parseFloat(document.getElementById('maxDist').value) || 10;
            
            // 2. ТЕХНИКА
            const hasWash = document.getElementById('washMachine').checked;
            const hasDish = document.getElementById('dishWasher').checked;
            const hasOven = document.getElementById('ovenMicrowave').checked;
            const hasBoiler = document.getElementById('boilerCheck').checked;
            const boilerType = document.getElementById('boilerType').value;
            
            // 3. САНУЗЕЛ И ПОЛЫ
            const bathSockets = parseInt(document.getElementById('bathSockets').value) || 0;
            const floorHeatZones = parseInt(document.getElementById('floorHeatZones').value) || 0;
            const floorHeatArea = parseInt(document.getElementById('floorHeatArea').value) || 0;
            const hasFloorHeat = floorHeatZones > 0;

            // 4. СВЕТ И РОЗЕТКИ
            const mainLights = parseInt(document.getElementById('mainLights').value) || 0;
            const bathLights = parseInt(document.getElementById('bathLights').value) || 0;
            const kCounter = parseInt(document.getElementById('kitchenCounter').value) || 0;
            const roomSockets = parseInt(document.getElementById('roomSockets').value) || 0;
            const switches = parseInt(document.getElementById('switches').value) || 0;
            const hasMasterKey = document.getElementById('masterKey').checked;

            const totalSockets = kCounter + roomSockets + bathSockets + (hasWash?1:0) + (hasDish?1:0) + (hasOven?1:0) + (hasBoiler?1:0);
            const totalLights = mainLights + bathLights;
            const totalPoints = totalSockets + totalLights + switches;

            const countPodrozetniki = totalSockets + switches;
            const countJunctionBoxes = Math.ceil(totalPoints / 5) + 2;

            const cableData = calculateCable(area, totalPoints, maxDist, cableCoef, hasFloorHeat);
            const lenPwr = cableData.pwr;   
            const lenLight = cableData.light;

            // === ГРУППЫ ЩИТА ===
            let groups = [];
            groups.push({name: "Вводной автомат + Реле напряжения", type: "main"});

            if(hasWash) groups.push({name: "Стиральная машина", w: 2.5});
            if(hasDish) groups.push({name: "ПММ", w: 2.5});
            if(hasOven) groups.push({name: "Духовка + СВЧ", w: 2.5});
            if(hasBoiler) {
                let w = (boilerType === 'flow') ? 6.0 : 2.5;
                groups.push({name: (boilerType === 'flow' ? "Проточный (3x6)" : "Бойлер (3x2.5)"), w: w});
            }
            if(kCounter > 0) groups.push({name: "Розетки фартука", w: 2.5});
            if(bathSockets > 0) groups.push({name: "Розетки с/у (УЗО)", w: 2.5});
            
            if(hasFloorHeat) {
                groups.push({name: `Теплые полы (${floorHeatZones} зон)`, w: 2.5});
            }
            
            if(mainLights > 0) groups.push({name: `Свет основной (${mainLights} т.)`, w: 1.5});
            if(bathLights > 0) groups.push({name: "Свет с/у (УЗО)", w: 1.5});
            
            const roomSockGroups = Math.ceil(roomSockets / 8);
            for(let i=1; i<=roomSockGroups; i++) groups.push({name: `Розетки комн. гр.${i}`, w: 2.5});
            
            if(hasMasterKey) groups.push({name: "Контактор", w: 0, type: 'contactor'});

            // === СТОИМОСТЬ ===
            const costCablePwr = lenPwr * P.cable_2_5; 
            const costCableLight = lenLight * P.cable_1_5;
            
            const costSocketsMech = totalSockets * P.socket;
            const costSwitchesMech = switches * P.switch;
            const costPodrozetniki = countPodrozetniki * P.pod;
            const costJunctionBoxes = countJunctionBoxes * P.junction_box;
            const costLights = totalLights * P.light;
            const costBoxes = groups.length * P.box; 
            
            const costFloorHeat = hasFloorHeat ? (P.floor_heat_control + floorHeatArea * P.floor_heat_mat) : 0;
            const costContactor = hasMasterKey ? P.contactor : 0;
            const uzoCount = hasFloorHeat ? 3 : 2; 
            const costUZO = uzoCount * P.uzo;

            const totalMaterials = costCablePwr + costCableLight + costSocketsMech + costSwitchesMech + 
                                   costPodrozetniki + costJunctionBoxes + costLights + costBoxes + 
                                   costUZO + costFloorHeat + costContactor;

            const workStrobe = (lenPwr + lenLight) * wallPrice * 0.8;
            const workInstallPoints = totalSockets * P.work_point;
            const workInstallLights = totalLights * P.work_light;
            const workFloorHeat = hasFloorHeat ? (floorHeatArea * 500) : 0;
            const workContactor = hasMasterKey ? 1500 : 0;
            const workPanel = P.work_panel + (groups.length * P.work_group);

            const totalWork = workStrobe + workInstallPoints + workInstallLights + workFloorHeat + workContactor + workPanel;
            const grandTotal = totalMaterials + totalWork;

            // === ВЫВОД ===
            let alerts = "";
            if(hasBoiler && boilerType === 'flow') alerts += "<div class='alert'>⚠️ Проточный требует кабель 3x6!</div>";
            if(groups.length > 12) alerts += "<div class='alert'>ℹ️ Щит >12 модулей. Рекомендуем двухрядный.</div>";

            let groupHtml = groups.map(g => {
                if(g.type === 'contactor') return `<li><span>${g.name}</span> <span>2 мод</span></li>`;
                return `<li><span>${g.name}</span> <span>${g.w?g.w+'мм²':'-'}</span></li>`;
            }).join('');

            const html = `
                ${alerts}
                
                <div style="font-weight:bold; margin-bottom:10px; color:var(--primary);">📦 Закупка материалов:</div>
                <div class="cable-breakdown">
                    <div class="cable-row"><span> ВВГнг 3×2.5 (Силовой):</span> <b>${lenPwr} м</b></div>
                    <div class="cable-row"><span>🧵 ВВГнг 3×1.5 (Свет):</span> <b>${lenLight} м</b></div>
                    <div class="cable-row"><span>🔌 Механизмы (розетки):</span> <span class="item-count">${totalSockets} шт</span></div>
                    <div class="cable-row"><span>🔲 Механизмы (выкл):</span> <span class="item-count">${switches} шт</span></div>
                    <div class="cable-row" style="background:rgba(0,122,255,0.1); padding:5px; border-radius:4px;"><span> <b>Подрозетники:</b></span> <span class="item-count"><b>${countPodrozetniki} шт</b></span></div>
                    <div class="cable-row"><span> Распред. коробки:</span> <span class="item-count">~${countJunctionBoxes} шт</span></div>
                    ${hasFloorHeat ? `<div class="cable-row"><span> Терморегулятор ТП:</span> <span class="item-count">1 шт (на все зоны)</span></div>` : ''}
                </div>

                <div style="font-weight:bold; margin-bottom:5px; margin-top:15px;">📋 Схема щита (${groups.length} групп):</div>
                <ul class="group-list">${groupHtml}</ul>
                
                <hr style="border:0; border-top:1px dashed #ccc; margin:15px 0;">
                <div style="display:flex; justify-content:space-between; font-size:15px;"><span>Материалы:</span> <span>${totalMaterials} ₽</span></div>
                <div style="display:flex; justify-content:space-between; font-size:15px;"><span>Работы:</span> <span>${totalWork} ₽</span></div>
                <div class="total-price">ИТОГО: ${grandTotal} ₽</div>
            `;

            const resDiv = document.getElementById('result');
            resDiv.innerHTML = html;
            resDiv.style.display = 'block';
            resDiv.scrollIntoView({behavior:'smooth'});

            window.lastData = `Проект на ${area}м²\nКабель: ${cableData.total}м\nПодрозетники: ${countPodrozetniki} шт\nГрупп: ${groups.length}\nИтого: ${grandTotal} руб.`;

        } catch(e) { 
            alert("Ошибка расчета: " + e.message); 
            console.error(e); 
        }
    }

    function copyResult() {
        if(!window.lastData) return;
        navigator.clipboard.writeText(window.lastData).then(() => alert("Скопировано!"));
    }
</script>

</body>
</html>
