<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏗️ Черновая электрика</title>
    <link rel="stylesheet" href="rough.css">
</head>
<body>

<div class="app">
    <h1>🏗️ Черновая электрика</h1>
    <div class="mode-indicator">Штробление, кабель, подрозетники, сборка щита</div>

    <!-- ПАРАМЕТРЫ -->
    <h2>📐 Параметры объекта</h2>
    <div class="grid-2">
        <div class="form-row">
            <label>Площадь (м²)</label>
            <input type="number" id="area" value="60">
        </div>
        <div class="form-row">
            <label>Дальняя точка (м)</label>
            <input type="number" id="maxDist" value="20">
        </div>
    </div>
    
    <div class="form-row">
        <label>Сложность трассы</label>
        <select id="cableCoef">
            <option value="1.0">Стандарт</option>
            <option value="1.3" selected>Высокая (ниши, обходы)</option>
            <option value="0.9">Низкая</option>
        </select>
    </div>
    
    <div class="form-row">
        <label>Материал стен</label>
        <select id="wallType">
            <option value="350">Панель / Ж/Б</option>
            <option value="280" selected>Монолит / Кирпич</option>
            <option value="150">ГКЛ / Дерево</option>
        </select>
    </div>

    <!-- САНУЗЛЫ -->
    <h2>🚿 Санузлы</h2>
    <div class="form-row">
        <label>Количество санузлов:</label>
        <div class="bath-selector">
            <button type="button" id="bath1Btn" class="active" onclick="setBathCount(1)">1</button>
            <button type="button" id="bath2Btn" onclick="setBathCount(2)">2</button>
        </div>
    </div>

    <!-- ТЕХНИКА -->
    <h2>🔌 Техника</h2>
    <div class="toggle-group"><label>Стиральная машина</label><input type="checkbox" id="washMachine" checked></div>
    <div class="toggle-group"><label>Посудомоечная машина</label><input type="checkbox" id="dishWasher" checked></div>
    <div class="toggle-group"><label>Духовой шкаф + СВЧ</label><input type="checkbox" id="ovenMicrowave" checked></div>
    
    <div class="toggle-group">
        <label>Водонагреватель</label>
        <input type="checkbox" id="boilerCheck" onchange="toggleBoiler()">
    </div>
    <div id="boilerOptions" class="sub-option">
        <select id="boilerType">
            <option value="storage" selected>Накопительный</option>
            <option value="flow">Проточный</option>
        </select>
    </div>

    <!-- ВЫБОР ПОМЕЩЕНИЙ -->
    <h2>🏠 Выбор помещений</h2>
    <div class="room-selector-grid" id="roomSelector"></div>
    
    <div class="phase-note">
        <strong>💡 Подсказка:</strong> Отметьте галочками нужные комнаты.
    </div>

    <!-- СПИСОК ПОМЕЩЕНИЙ -->
    <h2>📋 Детализация помещений</h2>
    <div id="roomsContainer"></div>

    <!-- ТЕПЛЫЕ ПОЛЫ -->
    <h2>🔥 Теплые полы</h2>
    <div class="toggle-group">
        <label>Зоны теплого пола:</label>
        <select id="floorHeatZones" onchange="toggleFloorHeat()">
            <option value="0">Нет</option>
            <option value="1">1 зона</option>
            <option value="2" selected>2 зоны</option>
            <option value="3">3 зоны</option>
        </select>
    </div>
    <div id="floorHeatOptions" class="sub-option visible">
        <div class="grid-2">
            <div class="form-row">
                <label>Площадь ТП (м²)</label>
                <input type="number" id="floorHeatArea" value="4">
            </div>
            <div class="form-row">
                <label>Терморегуляторы</label>
                <input type="number" id="tpRegulators" value="2">
            </div>
        </div>
    </div>

    <div class="toggle-group">
        <label>⚡ Мастер-клавиша</label>
        <input type="checkbox" id="masterKey" onchange="toggleMasterKey()">
    </div>
    <div id="masterKeyInfo" class="sub-option">
        <div class="alert">Требуется контактор (2 модуля)</div>
    </div>

    <button class="btn btn-rough" onclick="calculate()">📊 Рассчитать черновую</button>
    <button class="btn btn-secondary" onclick="copyResult()">📋 Копировать</button>

    <div id="result"></div>
</div>

<!-- Подключаем файлы в правильном порядке -->
<script src="materials.js"></script>
<script src="panel.js"></script>
<script src="rough.js"></script>
</body>
</html>
